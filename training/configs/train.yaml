defaults:
  - model: paragru
  - data: slimpajama
  - _self_

seed: 42

# Training
seq_length: 2048
batch_size_per_gpu: 32
gradient_clip: 1.0
total_iterations: 55000
warmup_iterations: 5500
z_loss_coeff: 1.0e-4

# Optimizer (AdamW)
optimizer:
  lr: 0.003
  weight_decay: 1.0e-4
  betas: [0.9, 0.95]
  eps: 1.0e-8

# Schedule: cosine to 0
scheduler:
  type: cosine
  min_lr: 0.0

# Precision
dtype: bfloat16

# Logging
eval_interval: 1000
save_interval: 5000
log_interval: 10

# Checkpointing
checkpoint_dir: /projects/m000120/xavier18/pararnn_checkpoints
resume_from: null

# WandB
wandb:
  enabled: true
  entity: xavier_gonzalez
  project: paraRNN

# Newton config (for ParaRNN models)
newton:
  max_its: 3
  norm: inf

# FSDP
fsdp:
  enabled: true

hydra:
  run:
    dir: .
  job:
    chdir: false
